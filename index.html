// ─── HELPERS ──────────────────────────────────────────────────────────────────

function dateKey(date) { return format(date, 'yyyy-MM-dd'); }

function inDisplayProgram(date) {
  return date >= startOfDay(PROG_DISPLAY_START) && date <= endOfDay(PROG_END);
}
function inActiveProgram(date) {
  return date >= startOfDay(PROG_START) && date <= endOfDay(PROG_END);
}

function programWeek(date) {
  const diff = Math.floor((date - FIRST_MONDAY) / 86400000);
  if (diff < 0 || diff > 25) return null;
  return Math.floor(diff / 7) + 1;
}

function fmt12(str) {
  if (!str || str === '24:00') return '12:00 AM';
  const [h, m] = str.split(':').map(Number);
  const ap = h >= 12 ? 'PM' : 'AM';
  return `${h % 12 || 12}:${String(m).padStart(2, '0')} ${ap}`;
}

function timeOnDate(str, base) {
  if (str === '24:00') return addDays(startOfDay(base), 1);
  const [h, m] = str.split(':').map(Number);
  const d = new Date(base);
  d.setHours(h, m, 0, 0);
  return d;
}

function buildSchedule(date, choices) {
  const key = dateKey(date);

  // Special days (orientation, weekends, arrival, departure)
  if (SPECIAL[key]) {
    return SPECIAL[key].map(b => {
      if (b.type === 'optional') {
        const chosen = choices[b.optKey];
        if (chosen === true)  return { ...b, type: 'course', subject: 'Selected Activity' };
        if (chosen === false) return { ...b, type: 'free', label: 'Free Time' };
      }
      return b;
    });
  }

  if (!inActiveProgram(date)) return null;

  const dow = getDay(date); // 0=Sun, 6=Sat
  if (dow === 0 || dow === 6) return null; // Weekend with no special schedule = null

  const wk = programWeek(date);
  if (!wk) return null;
  const c = WEEK_COURSES[wk];
  const gis = GIS[key];

  const blocks = [
    { id: 'sl1', type: 'sleep',     label: 'Sleep',      start: '00:00', end: '08:00' },
    { id: 'bf',  type: 'breakfast', label: 'Breakfast',  start: '08:00', end: '08:45', venue: 'Dining Hall' },
    { id: 'fr1', type: 'free',      label: 'Get Ready',  start: '08:45', end: '09:00' },
    { id: 'mor', type: 'course',    label: c.morningName, name: c.morningName, subject: 'Junior Track — Mathematics', venue: c.morningVenue, start: '09:00', end: '12:00', note: 'Tea Break: 10:30–10:45 AM' },
  ];

  if (gis) {
    blocks.push({ id: 'gis', type: 'seminar',   label: `Great Ideas Seminar`, name: `Great Ideas Seminar`, speaker: gis.speaker, venue: gis.venue, start: '12:00', end: '13:30', subject: 'Mandatory For All' });
    blocks.push({ id: 'lu',  type: 'lunch',     label: 'Lunch', start: '13:30', end: '14:30', venue: 'Dining Hall' });
  } else {
    blocks.push({ id: 'fr2', type: 'free',      label: 'Free Time',  start: '12:00', end: '13:00' });
    blocks.push({ id: 'lu',  type: 'lunch',     label: 'Lunch',      start: '13:00', end: '14:30', venue: 'Dining Hall' });
  }

  blocks.push({ id: 'aft', type: 'course',    label: c.afternoonName, name: c.afternoonName, subject: 'Junior Track — Science', venue: c.afternoonVenue, start: '14:30', end: '17:30', note: 'Tea Break included' });
  blocks.push({ id: 'fr3', type: 'free',      label: 'Free Time / Tea',   start: '17:30', end: '20:00' });
  blocks.push({ id: 'din', type: 'dinner',    label: 'Dinner',             start: '20:00', end: '21:30', venue: 'Dining Hall' });
  blocks.push({ id: 'sl2', type: 'sleep',     label: 'Sleep',              start: '22:00', end: '24:00' });

  return blocks;
}

const DAY_ABBR = ['Mo','Tu','We','Th','Fr','Sa','Su'];

function WeekStrip({ selected, onSelect }) {
  const wkStart = startOfWeek(selected, { weekStartsOn: 1 });
  const days    = Array.from({ length: 7 }, (_, i) => addDays(wkStart, i));
  return (
    <div className="bg-white rounded-2xl shadow-sm border border-purple-50 p-4">
      <div className="flex items-center justify-between mb-3">
        <button onClick={() => onSelect(addDays(selected, -7))} data-testid="btn-prev-week"
          className="w-8 h-8 flex items-center justify-center rounded-xl hover:bg-purple-50 text-[#5B4FE8] transition-colors"><ChevL /></button>
        <span className="text-sm font-semibold text-[#3730A3]">{format(selected, 'MMMM yyyy')}</span>
        <button onClick={() => onSelect(addDays(selected, 7))} data-testid="btn-next-week"
          className="w-8 h-8 flex items-center justify-center rounded-xl hover:bg-purple-50 text-[#5B4FE8] transition-colors"><ChevR /></button>
      </div>
      <div className="grid grid-cols-7 gap-1">
        {days.map((day, i) => {
          const sel  = isSameDay(day, selected);
          const tod  = isToday(day);
          const prog = inDisplayProgram(day);
          return (
            <button key={i} onClick={() => onSelect(day)} data-testid={`strip-${i}`}
              className={`flex flex-col items-center py-2 rounded-xl transition-all ${!sel && tod ? 'bg-purple-50 text-[#5B4FE8]' : !sel ? 'hover:bg-gray-50 text-gray-600' : ''}`}
              style={sel ? { background: 'linear-gradient(135deg,#5B4FE8,#7C3AED)', color: 'white', boxShadow: '0 4px 12px rgba(91,79,232,0.35)' } : {}}>
              <span className="text-xs font-medium mb-0.5">{DAY_ABBR[i]}</span>
              <span className="text-sm font-bold">{format(day, 'd')}</span>
              {prog && !sel && <span className="w-1 h-1 rounded-full bg-[#5B4FE8] opacity-35 mt-1 block" />}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─── MONTH CALENDAR (desktop) ─────────────────────────────────────────────────
function MonthCalendar({ selected, onSelect }) {
  const [view, setView] = useState(() => startOfMonth(selected));
  const days = useMemo(() => {
    const mS = startOfMonth(view), mE = endOfMonth(view);
    const cS = startOfWeek(mS, { weekStartsOn: 0 }), cE = endOfWeek(mE, { weekStartsOn: 0 });
    const arr = []; let c = cS;
    while (c <= cE) { arr.push(c); c = addDays(c, 1); }
    return arr;
  }, [view]);

  return (
    <div className="bg-white rounded-2xl shadow-sm border border-purple-50 p-5">
      <div className="flex items-center justify-between mb-5">
        <button onClick={() => setView(subMonths(view,1))} data-testid="btn-prev-month"
          className="w-8 h-8 flex items-center justify-center rounded-xl hover:bg-purple-50 text-[#5B4FE8] transition-colors"><ChevL /></button>
        <span className="font-bold text-[#3730A3]">{format(view,'MMMM yyyy')}</span>
        <button onClick={() => setView(addMonths(view,1))} data-testid="btn-next-month"
          className="w-8 h-8 flex items-center justify-center rounded-xl hover:bg-purple-50 text-[#5B4FE8] transition-colors"><ChevR /></button>
      </div>
      <div className="grid grid-cols-7 mb-1">
        {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d => (
          <div key={d} className="text-center text-xs font-semibold text-gray-300 py-1">{d}</div>
        ))}
      </div>
      <div className="grid grid-cols-7 gap-y-1">
        {days.map((day, i) => {
          const sel   = isSameDay(day, selected);
          const tod   = isToday(day);
          const inMon = isSameMonth(day, view);
          const prog  = inDisplayProgram(day);
          return (
            <button key={i} onClick={() => onSelect(day)} data-testid={`cal-${i}`}
              className={`relative aspect-square flex items-center justify-center rounded-xl text-sm font-medium transition-all ${
                !inMon ? 'text-gray-200' : !sel && tod ? 'bg-purple-50 text-[#5B4FE8] font-semibold' :
                !sel && prog ? 'text-gray-700 hover:bg-purple-50' : !sel ? 'text-gray-400 hover:bg-gray-50' : ''
              }`}
              style={sel ? { background: 'linear-gradient(135deg,#5B4FE8,#7C3AED)', color: 'white', fontWeight: 700, boxShadow: '0 4px 14px rgba(91,79,232,0.38)' } : {}}>
              {format(day, 'd')}
              {prog && !sel && inMon && <span className="absolute bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full bg-[#5B4FE8] opacity-30" />}
            </button>
          );
        })}
      </div>
      <div className="mt-5 pt-4 border-t border-purple-50 space-y-1">
        <p className="text-xs font-bold text-gray-300 uppercase tracking-wide">LG-AUP 2026</p>
        <p className="text-xs text-gray-500">Arrival May 16 · Program May 17 – June 14</p>
        <p className="text-xs text-gray-500">Ashoka University, Sonipat</p>
        <div className="flex items-center gap-2 mt-1">
          <span className="w-2 h-2 rounded-full bg-[#5B4FE8] opacity-30 inline-block" />
          <span className="text-xs text-gray-400">Program day</span>
        </div>
      </div>
    </div>
  );
}

// ─── NOTIFICATION PANEL ───────────────────────────────────────────────────────
function NotifPanel({ selected, schedule }) {
  const supported = typeof Notification !== 'undefined';
  const [perm,    setPerm   ] = useState(() => supported ? Notification.permission : 'denied');
  const [enabled, setEnabled] = useState(() => localStorage.getItem('notif-on') === '1');

  const upcoming = useMemo(() => {
    if (!schedule) return [];
    const relevant = ['course','seminar','mandatory','breakfast','lunch','dinner'];
    return schedule
      .filter(b => relevant.includes(b.type))
      .map(b => ({ ...b, t: timeOnDate(b.start, selected) }))
      .filter(b => isSameDay(selected, new Date()) ? isAfter(b.t, new Date()) : true)
      .map(b => ({ ...b, mins: Math.max(0, differenceInMinutes(b.t, new Date())) }));
  }, [schedule, selected]);

  async function requestPerm() {
    if (!supported) return;
    const p = await Notification.requestPermission();
    setPerm(p);
    if (p === 'granted') { setEnabled(true); localStorage.setItem('notif-on','1'); }
  }
  function toggle() {
    if (!enabled && perm !== 'granted') { requestPerm(); return; }
    const next = !enabled;
    setEnabled(next);
    localStorage.setItem('notif-on', next ? '1' : '0');
  }
  const isOn = enabled && perm === 'granted';

  return (
    <div className="absolute right-0 top-12 bg-white rounded-2xl shadow-2xl border border-purple-100 z-50 overflow-hidden slide-down"
      style={{ width: '17.5rem' }}>
      <div className="p-4 border-b border-purple-50">
        <div className="flex items-center justify-between">
          <p className="font-bold text-[#3730A3] text-sm">Notifications</p>
          <button onClick={toggle} data-testid="toggle-notif"
            className="relative w-10 h-6 rounded-full transition-colors flex-shrink-0"
            style={{ background: isOn ? '#5B4FE8' : '#E5E7EB' }}>
            <span className={`absolute top-1 w-4 h-4 bg-white rounded-full shadow-sm transition-transform ${isOn ? 'translate-x-5' : 'translate-x-1'}`} />
          </button>
        </div>
        {perm === 'denied' && <p className="text-xs text-red-400 mt-1.5">Blocked. Enable in browser site settings.</p>}
        {perm === 'default' && (
          <button onClick={requestPerm} data-testid="btn-enable-notif"
            className="mt-2 w-full text-xs font-semibold text-white py-2 rounded-xl"
            style={{ background: 'linear-gradient(135deg,#5B4FE8,#7C3AED)' }}>
            Enable Browser Notifications
          </button>
        )}
      </div>
      <div className="p-4">
        <p className="text-xs font-bold text-gray-300 uppercase tracking-wide mb-3">
          {isSameDay(selected, new Date()) ? "Today's Schedule" : format(selected,'MMM d') + ' Schedule'}
        </p>
        {upcoming.length === 0 ? (
          <p className="text-sm text-gray-300 text-center py-5">No upcoming events.</p>
        ) : (
          <div className="space-y-2 max-h-64 overflow-y-auto hide-scroll">
            {upcoming.map((r, i) => {
              const colors = r.type === 'course' ? '#5B4FE8' : r.type === 'seminar' ? '#0EA5E9' : r.type === 'breakfast' ? '#F59E0B' : r.type === 'lunch' ? '#10B981' : r.type === 'dinner' ? '#8B5CF6' : '#F97066';
              return (
                <div key={i} className="flex items-start gap-3 p-2.5 rounded-xl bg-purple-50/60">
                  <span className="w-2 h-2 rounded-full mt-1.5 flex-shrink-0" style={{ background: colors }} />
                  <div>
                    <p className="text-xs font-semibold text-gray-700 leading-snug">{r.name || r.label}</p>
                    <p className="text-xs mt-0.5" style={{ color: colors }}>
                      {isSameDay(selected,new Date()) && r.mins < 120 ? `In ${r.mins} min · ` : ''}{fmt12(r.start)}
                    </p>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── HEADER ───────────────────────────────────────────────────────────────────
function Header({ selected, schedule }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  const badge = useMemo(() => {
    if (!schedule || !isSameDay(selected, new Date())) return 0;
    const now = new Date();
    return schedule.filter(b =>
      ['course','seminar','mandatory'].includes(b.type) &&
      isAfter(timeOnDate(b.start, selected), now)
    ).length;
  }, [schedule, selected]);

  useEffect(() => {
    function onDown(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', onDown);
    return () => document.removeEventListener('mousedown', onDown);
  }, []);

  return (
    <div className="text-white px-5 py-4 rounded-2xl shadow-xl mb-4"
      style={{ background: 'linear-gradient(135deg,#5B4FE8,#7C3AED)', boxShadow: '0 8px 28px rgba(91,79,232,0.3)' }}>
      <div className="flex items-center justify-between">
        <div>
          <div className="flex items-center gap-2 mb-0.5">
            <span className="text-xs font-bold bg-white/20 px-2 py-0.5 rounded-full">LG-AUP 2026</span>
            <span className="text-xs font-bold bg-white/20 px-2 py-0.5 rounded-full">Junior Track</span>
          </div>
          <h1 className="font-extrabold text-xl leading-tight">My Course Schedule</h1>
          <p className="text-sm" style={{ color: 'rgba(255,255,255,0.65)' }}>Ashoka University · May 17 – June 14</p>
        </div>
        <div className="relative" ref={ref}>
          <button onClick={() => setOpen(p => !p)} data-testid="btn-bell"
            className="w-10 h-10 flex items-center justify-center rounded-xl transition-colors"
            style={{ background: 'rgba(255,255,255,0.15)' }}
            onMouseEnter={e => e.currentTarget.style.background='rgba(255,255,255,0.25)'}
            onMouseLeave={e => e.currentTarget.style.background='rgba(255,255,255,0.15)'}>
            <BellSVG />
          </button>
          {badge > 0 && (
            <span className="absolute -top-1.5 -right-1.5 min-w-5 h-5 px-1 bg-[#F97066] rounded-full text-xs font-extrabold text-white flex items-center justify-center pointer-events-none border-2 border-[#5B4FE8] z-10">
              {badge}
            </span>
          )}
          {open && <NotifPanel selected={selected} schedule={schedule} />}
        </div>
      </div>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [selected, setSelected] = useState(new Date(2026, 4, 17)); // May 17 orientation day
  const [choices, setChoices] = useState(() => {
    try { return JSON.parse(localStorage.getItem('opt-choices') || '{}'); }
    catch { return {}; }
  });

  const schedule = useMemo(() => buildSchedule(selected, choices), [selected, choices]);

  function handleChoose(key, val) {
    const next = { ...choices, [key]: val };
    setChoices(next);
    localStorage.setItem('opt-choices', JSON.stringify(next));
  }

  // Browser notifications
  useEffect(() => {
    if (typeof Notification === 'undefined') return;
    if (Notification.permission !== 'granted' || localStorage.getItem('notif-on') !== '1') return;
    if (!schedule || !isSameDay(selected, new Date())) return;
    const timers = schedule
      .filter(b => ['course','seminar','mandatory'].includes(b.type))
      .map(b => {
        const delay = addMinutes(timeOnDate(b.start, selected), -15) - new Date();
        if (delay <= 0) return null;
        return setTimeout(() => new Notification(`Starting in 15 min: ${b.name || b.label}`, { body: `${fmt12(b.start)}${b.venue ? ' · '+b.venue : ''}` }), delay);
      }).filter(Boolean);
    return () => timers.forEach(clearTimeout);
  }, [schedule, selected]);

  const dateLabel   = format(selected, 'EEEE, MMMM d');
  const isProgRange = inDisplayProgram(selected);

  return (
    <div className="min-h-screen p-4 md:p-6 max-w-6xl mx-auto" style={{ background: '#F3F2FC' }}>
      <Header selected={selected} schedule={schedule} />

      {/* ── MOBILE ── */}
      <div className="lg:hidden space-y-4">
        <WeekStrip selected={selected} onSelect={setSelected} />
        <div>
          <h2 className="text-xl font-extrabold text-[#1E1B4B] mb-0.5">{dateLabel}</h2>
          {!isProgRange && <p className="text-xs text-gray-400">Outside program dates.</p>}
        </div>
        <ScheduleTimeline date={selected} schedule={schedule} choices={choices} onChoose={handleChoose} />
      </div>

      {/* ── DESKTOP ── */}
      <div className="hidden lg:grid lg:grid-cols-[310px_1fr] gap-6 items-start">
        <div className="sticky top-6 space-y-4">
          <MonthCalendar selected={selected} onSelect={setSelected} />
        </div>
        <div>
          <div className="mb-5">
            <h2 className="text-2xl font-extrabold text-[#1E1B4B]">{dateLabel}</h2>
            {!isProgRange && <p className="text-sm text-gray-400 mt-1">Outside program dates.</p>}
          </div>
          <div className="bg-white rounded-2xl shadow-sm border border-purple-50 p-6">
            <ScheduleTimeline date={selected} schedule={schedule} choices={choices} onChoose={handleChoose} />
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
